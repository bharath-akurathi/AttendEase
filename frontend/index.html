<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/icon-512.png" sizes="any">
  <title>AttendEase | Attendance System</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #fafafa;
    }
  </style>
</head>

<body>
  <script>
    // Force logout on every full page load/reload as requested
    localStorage.removeItem('attendease_student');
    for (const key of Object.keys(localStorage)) {
      if (key.startsWith('vite:')) {
        localStorage.removeItem(key);
      }
      if (key.startsWith('sb-') && key.endsWith('-auth-token')) {
        localStorage.removeItem(key);
      }
    }

    // Smoothly route to landing page on reload before React Router initializes
    if (window.location.pathname !== '/' && window.location.pathname !== '/login') {
      window.history.replaceState(null, '', '/');
    }
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
